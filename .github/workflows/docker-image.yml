name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: docker login
      run:  docker login -u ${DOCKERHUB_USERNAME} -p ${DOCKERHUB_PWD}
    - name: Build the Docker image
      run:  docker build . --file Dockerfile --tag kowsy25/my-image-name:v1
    - name: push docker image
      run: docker push kowsy25/my-image-name:v1
